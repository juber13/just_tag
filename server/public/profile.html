<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Profile — Justagg</title>
  <link rel="stylesheet" href="/css/profile.css" />
</head>
<body>
  <div id="app" class="page">
    <div id="loading" class="state-msg">Loading profile…</div>
    <div id="error" class="state-msg error hidden"></div>

    <main id="profile" class="profile hidden">
      <div class="banner" id="banner"></div>

      <div class="identity">
        <div class="avatar-wrap">
          <img id="avatar" class="avatar hidden" alt="" />
          <div id="avatar-fallback" class="avatar avatar-fallback">?</div>
        </div>
        <div class="identity-text">
          <div id="org-badge" class="org-badge hidden"></div>
          <h1 id="name" class="name"></h1>
          <p id="role" class="role"></p>
        </div>
      </div>

      <div class="body">
        <button type="button" id="connect-btn" class="connect-pill">Connect</button>
        <div id="links-grid" class="links-grid"></div>
      </div>
    </main>
  </div>

  <div id="contact-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-sheet contact-sheet">
      <div class="contact-sheet-header">
        <div class="contact-sheet-banner" id="modal-banner">
          <button type="button" class="contact-modal-close" data-close aria-label="Close">&times;</button>
        </div>
        <div class="contact-sheet-identity">
          <img id="modal-avatar" class="contact-profile-avatar hidden" alt="" />
          <div id="modal-avatar-fallback" class="contact-profile-avatar contact-profile-avatar--fallback">?</div>
        </div>
      </div>

      <div class="contact-sheet-body">
        <h2 class="modal-title">Contact me</h2>

        <div class="contact-avatar-upload">
          <div class="contact-avatar-preview" id="contact-avatar-preview">
          <svg class="contact-avatar-placeholder" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="#b0b0b0"/>
          </svg>
          <img id="contact-avatar-img" class="contact-avatar-img hidden" alt="" />
        </div>
        <label class="add-image-btn">
          Add image
          <input type="file" id="contact-photo-input" accept="image/*" hidden />
        </label>
        </div>

        <form id="contact-form" class="contact-form">
          <label class="field">
            <span class="field-label">Name <span class="req">*</span></span>
            <input type="text" name="name" id="contact-name" placeholder="Enter Name" required autocomplete="name" />
          </label>
          <label class="field">
            <span class="field-label">Email</span>
            <input type="email" name="email" id="contact-email" placeholder="Enter Email" autocomplete="email" />
          </label>
          <label class="field">
            <span class="field-label">Phone Number <span class="req">*</span></span>
            <input type="tel" name="phone" id="contact-phone" placeholder="Enter phone Number" required autocomplete="tel" />
          </label>

          <details class="more-fields" id="contact-more-fields">
            <summary class="more-fields-toggle">
              Add more info
              <svg class="more-fields-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <path d="M2.5 4.5L6 8l3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </summary>
            <div class="more-fields-content">
              <label class="field">
                <span class="field-label">Job Title</span>
                <input type="text" name="jobTitle" placeholder="Enter Job Title" autocomplete="organization-title" />
              </label>
              <label class="field">
                <span class="field-label">Company</span>
                <input type="text" name="company" placeholder="Enter company name" autocomplete="organization" />
              </label>
              <label class="field">
                <span class="field-label">Message</span>
                <textarea name="message" placeholder="Write Message" rows="4"></textarea>
              </label>
            </div>
          </details>

          <button type="submit" class="submit-btn">Exchange Contact</button>
          <p id="contact-success" class="contact-success hidden">Contact submitted. Thank you!</p>
        </form>
      </div>
    </div>
  </div>

  <div id="payment-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-sheet modal-sheet-sm">
      <button type="button" class="modal-close" data-close aria-label="Close">&times;</button>
      <h2 id="payment-title" class="modal-title"></h2>
      <p class="payment-label">Account Detail</p>
      <p id="payment-id" class="payment-id"></p>
    </div>
  </div>

  <script src="/js/profile.js"></script>
</body>
</html>
