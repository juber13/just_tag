<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Justagg — Checkout</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: #666; line-height: 1.5; margin: 0 0 16px; }
    .error { color: #c0392b; }
    .hidden { display: none; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #4A90E2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="spinner"></div>
      <h1>Opening Razorpay</h1>
      <p>Please wait while we prepare your secure checkout.</p>
    </div>
    <div id="error" class="hidden">
      <h1>Checkout unavailable</h1>
      <p id="error-text" class="error"></p>
    </div>
  </div>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('order_id');
    const email = params.get('email');

    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const errorTextEl = document.getElementById('error-text');

    function showError(message) {
      loadingEl.classList.add('hidden');
      errorEl.classList.remove('hidden');
      errorTextEl.textContent = message;
    }

    function redirectToApp(path) {
      window.location.href = 'justtag://payment/' + path;
    }

    async function startCheckout() {
      if (!orderId || !email) {
        showError('Missing order details. Please return to the app and try again.');
        return;
      }

      try {
        const res = await fetch(
          '/api/payments/razorpay/checkout-config?order_id=' +
            encodeURIComponent(orderId) +
            '&email=' +
            encodeURIComponent(email),
        );
        const data = await res.json();
        if (!res.ok) {
          showError(data.error || 'Could not start checkout.');
          return;
        }

        const rzp = new Razorpay({
          key: data.keyId,
          amount: data.amount,
          currency: data.currency,
          order_id: data.orderId,
          name: 'Justagg',
          description: data.planName,
          prefill: data.prefill,
          theme: { color: '#4A90E2' },
          handler: async function (response) {
            try {
              const verifyRes = await fetch('/api/payments/razorpay/verify', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'X-Owner-Email': email,
                },
                body: JSON.stringify(response),
              });
              const verifyData = await verifyRes.json();
              if (!verifyRes.ok) {
                showError(verifyData.error || 'Payment verification failed.');
                return;
              }
              redirectToApp('success');
            } catch {
              showError('Payment verification failed. Please contact support.');
            }
          },
          modal: {
            ondismiss: function () {
              redirectToApp('cancelled');
            },
          },
        });

        loadingEl.classList.add('hidden');
        rzp.open();
      } catch {
        showError('Could not connect to the payment server.');
      }
    }

    startCheckout();
  </script>
</body>
</html>
